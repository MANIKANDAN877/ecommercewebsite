<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Coco - Orders Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b130e;
            --card-bg: rgba(26, 43, 33, 0.45);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #4ade80;
            --primary-hover: #22c55e;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 20%, rgba(34, 197, 94, 0.08) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(21, 128, 61, 0.08) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #a7f3d0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text {
            color: var(--primary);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            display: block;
        }

        .refresh-btn {
            background-color: var(--primary);
            color: #0b130e;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
            padding: 1.5rem;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 1.25rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.95rem;
            vertical-align: top;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .order-id {
            font-family: monospace;
            color: var(--primary);
            font-weight: 600;
        }

        .payment-id {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .amount-val {
            font-weight: 700;
            color: #fff;
        }

        .items-list {
            margin: 0;
            padding-left: 1.2rem;
            font-size: 0.88rem;
        }

        .items-list li {
            margin-bottom: 0.25rem;
        }

        .timestamp {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .empty-state {
            padding: 5rem 2rem;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            color: rgba(255, 255, 255, 0.1);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <a href="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Store</a>
                <span class="logo-text" style="margin-top: 0.5rem;">Harvest Management</span>
                <h1>Orders Dashboard</h1>
            </div>
            <button class="refresh-btn" id="refresh-btn">
                <i class="fa-solid fa-arrows-rotate"></i> Refresh
            </button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-title">Total Orders</span>
                <span class="stat-value" id="stat-orders-count">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-title">Total Revenue</span>
                <span class="stat-value" id="stat-revenue">₹0.00</span>
            </div>
        </div>

        <div class="table-container">
            <table id="orders-table">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Order / Payment ID</th>
                        <th>Products Ordered</th>
                        <th>Total Amount</th>
                    </tr>
                </thead>
                <tbody id="orders-tbody">
                    <!-- Dynamic Orders go here -->
                </tbody>
            </table>
            <div class="empty-state" id="empty-state" style="display: none;">
                <i class="fa-solid fa-box-open"></i>
                <p>No verified orders found yet.</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname.startsWith('192.168.') 
            ? '' 
            : 'https://auracoco-backend.onrender.com';

        async function fetchOrders() {
            const tbody = document.getElementById('orders-tbody');
            const emptyState = document.getElementById('empty-state');
            const ordersCountSpan = document.getElementById('stat-orders-count');
            const revenueSpan = document.getElementById('stat-revenue');

            try {
                const response = await fetch(`${API_BASE_URL}/api/admin/orders`);
                if (!response.ok) {
                    throw new Error('Failed to load orders.');
                }
                const orders = await response.json();

                // Sort by timestamp descending
                orders.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                ordersCountSpan.textContent = orders.length;
                
                const totalRevenue = orders.reduce((sum, order) => sum + (order.amount || 0), 0);
                revenueSpan.textContent = `₹${totalRevenue.toFixed(2)}`;

                tbody.innerHTML = '';
                if (orders.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }
                emptyState.style.display = 'none';

                orders.forEach(order => {
                    const row = document.createElement('tr');
                    
                    // Format date
                    const date = new Date(order.timestamp).toLocaleString('en-IN', {
                        dateStyle: 'medium',
                        timeStyle: 'short'
                    });

                    // Build items list
                    const itemsHtml = order.items && order.items.length > 0 
                        ? `<ul class="items-list">${order.items.map(item => `
                            <li><strong>${item.name}</strong> x ${item.quantity} (${item.size || 'Standard'})</li>
                          `).join('')}</ul>`
                        : `<span style="color: var(--text-muted); font-style: italic;">No details</span>`;

                    row.innerHTML = `
                        <td>
                            <span class="timestamp">${date}</span>
                        </td>
                        <td>
                            <div class="order-id">${order.order_id}</div>
                            <div class="payment-id">${order.payment_id}</div>
                        </td>
                        <td>
                            ${itemsHtml}
                        </td>
                        <td>
                            <span class="amount-val">₹${(order.amount || 0).toFixed(2)}</span>
                        </td>
                    `;

                    tbody.appendChild(row);
                });

            } catch (error) {
                console.error('Error fetching orders:', error);
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #ef4444;">Failed to load order logs.</td></tr>`;
            }
        }

        document.getElementById('refresh-btn').addEventListener('click', fetchOrders);
        document.addEventListener('DOMContentLoaded', fetchOrders);
    </script>
</body>
</html>
