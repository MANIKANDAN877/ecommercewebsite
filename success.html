<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Coco - Payment Successful</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b130e;
            --card-bg: rgba(26, 43, 33, 0.45);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #4ade80;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 20%, rgba(34, 197, 94, 0.08) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(21, 128, 61, 0.08) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            box-sizing: border-box;
        }

        .success-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
            padding: 3rem 2rem;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animated-checkmark {
            width: 80px;
            height: 80px;
            background: rgba(74, 222, 128, 0.1);
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 2rem;
            font-size: 2.5rem;
            color: var(--primary);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4);
            }
            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 15px rgba(74, 222, 128, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0);
            }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            margin: 0 0 0.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #a7f3d0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }

        .details-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .detail-label {
            color: var(--text-muted);
        }

        .detail-value {
            font-weight: 600;
            color: #fff;
            font-family: monospace;
            font-size: 0.95rem;
        }

        .detail-value.amount {
            color: var(--primary);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .btn-continue {
            background-color: var(--primary);
            color: #0b130e;
            border: none;
            width: 100%;
            padding: 1rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.2);
        }

        .btn-continue:hover {
            transform: translateY(-2px);
            background-color: #22c55e;
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.3);
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="animated-checkmark">
            <i class="fa-solid fa-check"></i>
        </div>
        <h1>Order Confirmed!</h1>
        <p class="subtitle">Thank you for your harvest request. Your payment was verified successfully.</p>

        <div class="details-box">
            <div class="detail-row">
                <span class="detail-label">Order ID</span>
                <span class="detail-value" id="order-id">--</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Payment ID</span>
                <span class="detail-value" id="payment-id">--</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Amount Paid</span>
                <span class="detail-value amount" id="amount-paid">₹0.00</span>
            </div>
        </div>

        <a href="/" class="btn-continue">
            CONTINUE SHOPPING <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>

    <script>
        // Parse parameters from query string
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id') || 'N/A';
        const paymentId = urlParams.get('payment_id') || 'N/A';
        const amount = urlParams.get('amount') || '0';

        document.getElementById('order-id').textContent = orderId;
        document.getElementById('payment-id').textContent = paymentId;
        
        // Show amount in INR
        const parsedAmount = parseFloat(amount);
        document.getElementById('amount-paid').textContent = isNaN(parsedAmount) ? '₹0.00' : `₹${parsedAmount.toFixed(2)}`;
    </script>
</body>
</html>
